[pytest]
# ─── SyncFlow Customer Success Digital FTE — Stage 3 ────────────────────────
# Fast-by-default pytest configuration.
# Slow and load tests are excluded from the default run.

markers =
    slow: Long-running tests (>5s), burst simulations, and readiness probes.
          Run with: pytest -m slow
    load: Locust-based load tests requiring a live server.
          Run with: locust -f tests/load_test.py --host=http://localhost:8000

# Default run options:
#   --tb=short     compact tracebacks
#   --ignore       skip Locust file so it is never imported (avoids monkey-patching noise)
#   -m             exclude slow + load markers
addopts =
    --tb=short
    -m "not slow and not load"
    --ignore=tests/load_test.py

testpaths = tests

# Suppress DeprecationWarnings from datetime.utcnow() calls in Stage-2 code
# and from FastAPI's on_event deprecation — neither is actionable during tests.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
