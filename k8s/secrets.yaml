# ── SyncFlow Secrets Template ───────────────────────────────────────────────
# DO NOT commit real values. Populate with:
#   kubectl create secret generic syncflow-secrets -n syncflow \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=KAFKA_SASL_USERNAME="..." \
#     --from-literal=KAFKA_SASL_PASSWORD="..." \
#     --from-literal=TWILIO_ACCOUNT_SID="AC..." \
#     --from-literal=TWILIO_AUTH_TOKEN="..." \
#     --from-literal=GMAIL_CREDENTIALS_JSON='{...}'
#
# Values below are BASE64-ENCODED PLACEHOLDERS only.
apiVersion: v1
kind: Secret
metadata:
  name: syncflow-secrets
  namespace: syncflow
type: Opaque
data:
  # echo -n "your-value" | base64
  DATABASE_URL: cGxhY2Vob2xkZXI=           # placeholder
  OPENAI_API_KEY: cGxhY2Vob2xkZXI=         # placeholder
  KAFKA_BOOTSTRAP_SERVERS: cGxhY2Vob2xkZXI= # placeholder
  KAFKA_SASL_USERNAME: cGxhY2Vob2xkZXI=    # placeholder
  KAFKA_SASL_PASSWORD: cGxhY2Vob2xkZXI=    # placeholder
  TWILIO_ACCOUNT_SID: cGxhY2Vob2xkZXI=     # placeholder
  TWILIO_AUTH_TOKEN: cGxhY2Vob2xkZXI=      # placeholder
  GMAIL_CREDENTIALS_JSON: cGxhY2Vob2xkZXI= # placeholder
