apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncflow-worker
  namespace: syncflow
  labels:
    app: syncflow-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: syncflow-worker
  template:
    metadata:
      labels:
        app: syncflow-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/novasynctechnologies/syncflow-api:latest
          imagePullPolicy: Always
          command: ["python", "workers/message_processor.py"]
          envFrom:
            - configMapRef:
                name: syncflow-config
            - secretRef:
                name: syncflow-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncflow-metrics-collector
  namespace: syncflow
  labels:
    app: syncflow-metrics
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncflow-metrics
  template:
    metadata:
      labels:
        app: syncflow-metrics
        component: worker
    spec:
      containers:
        - name: metrics-collector
          image: ghcr.io/novasynctechnologies/syncflow-api:latest
          command: ["python", "workers/metrics_collector.py"]
          envFrom:
            - configMapRef:
                name: syncflow-config
            - secretRef:
                name: syncflow-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
